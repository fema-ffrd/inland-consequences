name: MkDocs Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
        
      - name: Checkout LFS objects
        run: |
          git lfs checkout

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: |
          uv sync --group dev

      - name: Markdown formatting check
        run: |
          uv run mdformat --check $(find docs -name '*.md' ! -name 'building_inventories.md' ! -name 'index.md') *.md

      - name: Check build
        run: |
          uv run mkdocs build

      - name: Run tests
        run: |
          uv run pytest

site_name: "Consequences Solution"
site_description: "Consequence modeling framework for flood damage assessments"
site_url: ""

repo_name: fema-ffrd/inland-consequences
repo_url: https://github.com/fema-ffrd/inland-consequences

theme:
  name: material
  logo: images/logo.svg
  favicon: images/favicon.svg
  features:
    # Navigation
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    # Search
    - search.suggest
    - search.highlight
    - search.share
    # Content
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    # Table of contents
    - toc.follow
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16

plugins:
  - search
  - include-markdown
  - macros
  - mkdocstrings:
      handlers:
        python:
          paths: [src, packages/core/src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            heading_level: 2
            show_if_no_docstring: false
            docstring_style: google
            docstring_section_style: table
            show_signature_annotations: true
            separate_signature: true
            merge_init_into_class: true
            group_by_category: true
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true

nav:
  - Overview:
    - index.md
  - Quick Start:
    - placeholder.md
    - prototype_notebooks.md
    - gh_installation.md
    - contributing.md
  - Methodology:
    - inventory_methodology.md
    - buildingvalidation_techapproach.md
    - hazardvalidation_techapproach.md
    - inland_methodology.md
    - coastal_methodology.md
  - Technical Implementation:
    - building_inventories.md
    - ddf_tech_implementation.md
    - AAL_tech_implementation.md
  - API Reference:
    - api/index.md
    - inland_consequences:
      - api/inland_consequences/inland_flood_analysis.md
      - api/inland_consequences/inland_vulnerability.md
      - api/inland_consequences/raster_collection.md
      - api/inland_consequences/results_aggregation.md
      - api/inland_consequences/nsi_buildings.md
      - api/inland_consequences/milliman_buildings.md
    - coastal_consequences:
      - api/inland_consequences/coastal/pfracoastal.md
    - sphere.core.schemas:
      - api/sphere_core/buildings.md
      - api/sphere_core/field_mapping.md
      - api/sphere_core/abstract_raster_reader.md
      - api/sphere_core/abstract_vulnerability_function.md
      - api/sphere_core/nsi_buildings.md

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  # PyMdown Extensions
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: fema-ffrd
      repo: inland-consequences
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js
  - javascripts/katex.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fema-ffrd/inland-consequences
  generator: false
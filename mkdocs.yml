site_name: "Inland Consequences"
site_url: 

theme:
  name: readthedocs

plugins:
  - search
  - include-markdown
  - macros
  - mkdocstrings:
      handlers:
        python:
          paths: [src, packages/core/src]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            heading_level: 2

repo_url: https://github.com/fema-ffrd/inland-consequences

nav:
  - Overview:
    - index.md
  - Methodlogy:
    - inventory_methodology.md
    - buildingvalidation_techapproach.md
    - hazardvalidation_techapproach.md
    - inland_methodology.md
    - coastal_methodology.md

  - Technical Implementation:
    - building_inventories.md
    - ddf_tech_implementation.md
    - AAL_tech_implementation.md

  - API Reference:
    - api/index.md
    - inland_consequences:
      - api/inland_consequences/inland_flood_analysis.md
      - api/inland_consequences/inland_vulnerability.md
      - api/inland_consequences/raster_collection.md
      - api/inland_consequences/results_aggregation.md
      - api/inland_consequences/nsi_buildings.md
      - api/inland_consequences/milliman_buildings.md
      - Coastal:
        - api/inland_consequences/coastal/pfracoastal.md
    - sphere.core.schemas:
      - api/sphere_core/buildings.md
      - api/sphere_core/field_mapping.md
      - api/sphere_core/abstract_raster_reader.md
      - api/sphere_core/abstract_vulnerability_function.md
      - api/sphere_core/nsi_buildings.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - toc:
      permalink: true

extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js
  - javascripts/katex.js